<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Déplacer Déposer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <img src="images/logo.jpg" width="150" height="auto">
    <marquee behavior="" direction="right"><h1>BIENVENUE CHEZ TRICOLI</h1></marquee>
    
   
  </div>
<div class="container">
  <hr>
  <button class="Refresh">Refresh</button>
  <h3 id="titre2">Colis à déplacer</h3>
  <hr>
 
<div class="espacement">
  
    <div id="b1" class="boite" draggable="true" data-zone="z1">-10KG <img src="images/colis1.png" width="100%"; height="auto";></div>
    <div id="b2" class="boite" draggable="true" data-zone="z2">-20KG <img src="images/colis2.png" width="100%"; height="auto";></div>
    <div id="b3" class="boite" draggable="true" data-zone="z3">+50KG <img src="images/colis3.png" width="100%"; height="auto";></div>
</div>
<div> 
  <hr>
  <h3>les zones de destination</h3>
  <hr>
<div class="espacement">
  
    <div id="z1" class="zone"><img src="images/palette1.png" width="60%"; height="auto";> -10 KG</div>
    <div id="z2" class="zone"><img src="images/palette2.png" width="70%"; height="auto";>  -20 KG</div>
    <div id="z3" class="zone"><img src="images/palette3.png" width="70%"; height="auto";> +50 KG</div>
</div>
</div>
<div class="footer">
  <p>© 2026 Mamadou & Najim tous droits réservés.</p>
</div>



<script src="app.js"></script>
</body>
</html>
